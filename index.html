<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yu-Gi-Oh! Forbidden Memories Fusions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1410 50%, #0f0f0f 100%);
        }
        .card-image {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card-image:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(201, 169, 97, 0.4);
        }
        .fusion-card {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .gold-text {
            background: linear-gradient(135deg, #d4af37 0%, #c9a961 50%, #8b7355 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <header class="bg-black bg-opacity-50 backdrop-blur-md shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-6">
            <h1 class="text-4xl md:text-5xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-red-500 to-pink-500">
                ⚔️ Yu-Gi-Oh! Forbidden Memories Fusions ⚔️
            </h1>
            <p class="text-center text-gray-300 mt-2">Clique nas imagens para ver as fusões possíveis</p>
            <p class="text-center text-gray-400 text-xs mt-1">Imagens fornecidas por YGOProDeck API</p>
        </div>
    </header>

    <!-- Main Container -->
    <main class="container mx-auto px-4 py-8">
        <!-- Search Bar -->
        <div class="mb-8">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="🔍 Buscar cartas..."
                class="w-full max-w-2xl mx-auto block px-6 py-3 rounded-full bg-white bg-opacity-10 backdrop-blur-md text-white placeholder-gray-400 border border-white border-opacity-20 focus:outline-none focus:ring-2 focus:ring-yellow-400"
            >
        </div>

        <!-- Cards Container -->
        <div id="cardContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <!-- Cards will be dynamically inserted here -->
        </div>
    </main>

    <!-- Fusion Modal -->
    <div id="fusionModal" class="fixed inset-0 bg-black bg-opacity-80 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-gradient-to-br from-gray-900 to-gray-800 rounded-2xl shadow-2xl max-w-6xl w-full max-h-[90vh] overflow-y-auto border border-yellow-500">
            <div class="sticky top-0 bg-gradient-to-r from-yellow-600 to-red-600 px-6 py-4 flex justify-between items-center rounded-t-2xl">
                <h2 class="text-2xl font-bold text-white" id="fusionModalTitle">Fusões Possíveis</h2>
                <button onclick="closeFusionModal()" class="text-white hover:text-gray-300 text-3xl font-bold">&times;</button>
            </div>
            <div id="fusionContent" class="p-6">
                <!-- Fusion content will be inserted here -->
            </div>
        </div>
    </div>

    <script src="./scripts.js"></script>
</body>
</html>
