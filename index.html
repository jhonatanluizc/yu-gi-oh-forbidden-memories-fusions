<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yu-Gi-Oh! Forbidden Memories Fusions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1410 50%, #0f0f0f 100%);
        }
        .yugioh-card {
            background: linear-gradient(145deg, #d4af37 0%, #f4d03f 20%, #d4af37 40%, #c9a961 60%, #d4af37 80%, #f4d03f 100%);
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        .yugioh-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 12px 24px rgba(212, 175, 55, 0.5);
        }
        .card-inner {
            background: linear-gradient(180deg, #2d1810 0%, #1a0f0a 100%);
            border-radius: 8px;
            overflow: hidden;
        }
        .card-name-bar {
            background: linear-gradient(90deg, #2d1810 0%, #4a2d1a 50%, #2d1810 100%);
            padding: 6px 10px;
            border-bottom: 2px solid #d4af37;
        }
        .card-image-container {
            position: relative;
            background: #000;
            margin: 8px;
            border: 2px solid #8b7355;
            border-radius: 4px;
            overflow: hidden;
        }
        .card-stats-bar {
            background: linear-gradient(90deg, #2d1810 0%, #3d2414 50%, #2d1810 100%);
            padding: 8px 10px;
            border-top: 2px solid #8b7355;
        }
        .fusion-card {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <header class="bg-black bg-opacity-50 backdrop-blur-md shadow-lg ">
        <div class="container mx-auto px-4 py-6">
            <h1 class="text-4xl md:text-5xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-red-500 to-pink-500">
                Yu-Gi-Oh! Forbidden Memories Fusions
            </h1>
            <p class="text-center text-gray-300 mt-2">Click on the images to see possible fusions</p>
            <p class="text-center text-gray-400 text-xs mt-1">Images provided by YGOProDeck API</p>
        </div>
    </header>

    <!-- Main Container -->
    <main class="container mx-auto px-4 py-8">
        <!-- Search Bar -->
        <div class="mb-6">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="🔍 Search cards..."
                class="w-full max-w-2xl mx-auto block px-6 py-3 rounded-full bg-white bg-opacity-10 backdrop-blur-md text-white placeholder-gray-400 border border-white border-opacity-20 focus:outline-none focus:ring-2 focus:ring-yellow-400"
            >
        </div>

        <!-- Filters -->
        <div class="mb-8 bg-black bg-opacity-40 backdrop-blur-md rounded-2xl p-6 border border-yellow-500 border-opacity-30">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-bold text-yellow-400">⚙️ Filters</h3>
                <button onclick="resetFilters()" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-semibold transition-colors">
                    🔄 Reset
                </button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <!-- Level Filter -->
                <div>
                    <label class="block text-gray-300 text-sm font-semibold mb-2">⭐ Level</label>
                    <select id="levelFilter" class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white border border-gray-600 focus:border-yellow-400 focus:outline-none">
                        <option value="">All Levels</option>
                        <option value="1">Level 1</option>
                        <option value="2">Level 2</option>
                        <option value="3">Level 3</option>
                        <option value="4">Level 4</option>
                        <option value="5">Level 5</option>
                        <option value="6">Level 6</option>
                        <option value="7">Level 7</option>
                        <option value="8">Level 8</option>
                        <option value="9">Level 9</option>
                        <option value="10">Level 10</option>
                        <option value="11">Level 11</option>
                        <option value="12">Level 12</option>
                    </select>
                </div>

                <!-- Type Filter -->
                <div>
                    <label class="block text-gray-300 text-sm font-semibold mb-2">🎴 Type</label>
                    <select id="typeFilter" class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white border border-gray-600 focus:border-yellow-400 focus:outline-none">
                        <option value="">All Types</option>
                    </select>
                </div>

                <!-- ATK Filter -->
                <div>
                    <label class="block text-gray-300 text-sm font-semibold mb-2">⚔️ ATK</label>
                    <input type="number" id="atkFilter" placeholder="ATK value" class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white border border-gray-600 focus:border-yellow-400 focus:outline-none">
                </div>

                <!-- DEF Filter -->
                <div>
                    <label class="block text-gray-300 text-sm font-semibold mb-2">🛡️ DEF</label>
                    <input type="number" id="defFilter" placeholder="DEF value" class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white border border-gray-600 focus:border-yellow-400 focus:outline-none">
                </div>
            </div>
            
            <!-- Results Counter -->
            <div class="mt-4 text-center">
                <span id="cardCount" class="text-gray-300 text-sm font-semibold"></span>
            </div>
        </div>

        <!-- Cards Container -->
        <div id="cardContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <!-- Cards will be dynamically inserted here -->
        </div>
    </main>

    <!-- Fusion Modal -->
    <div id="fusionModal" class="fixed inset-0 bg-black bg-opacity-80 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-gradient-to-br from-gray-900 to-gray-800 rounded-2xl shadow-2xl max-w-6xl w-full max-h-[90vh] overflow-y-auto border border-yellow-500">
            <div class="sticky top-0 bg-gradient-to-r from-yellow-600 to-red-600 px-6 py-4 flex justify-between items-center rounded-t-2xl">
                <h2 class="text-2xl font-bold text-white" id="fusionModalTitle">Possible Fusions</h2>
                <button onclick="closeFusionModal()" class="text-white hover:text-gray-300 text-3xl font-bold">&times;</button>
            </div>
            <div id="fusionContent" class="p-6">
                <!-- Fusion content will be inserted here -->
            </div>
        </div>
    </div>

    <script src="./scripts.js"></script>
</body>
</html>
